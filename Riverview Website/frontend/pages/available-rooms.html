<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>The Riverview | Real Time Availability</title>
        <link rel="stylesheet" href="../css/header.css">
        <style>
            /* Reset and base */
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html, body {
                display: flex;
                flex-direction: column;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                height: 100%;
                color: #333;
            }

            a {
                text-decoration: none;
                color: inherit;
            }

            img {
                max-width: 100%;
                display: block;
            }

            button {
                cursor: pointer;
                border: none;
                font-weight: 600;
            }

            #roomsBtn{
                background-color: #c7c8c8;
                color: #0b4e78;
                padding: 10px 20px;
                border: 1px solid;
                transition: background-color 0.3s;
            }

            /* Main container */
            main {
            flex: 1;
            flex-grow: 1;
            padding: 1.5rem 2rem;
            max-width: 100em;
            margin: auto;
            width: 100%;
            height: auto;
            }

            h2 {
            margin-bottom: 1rem;
            font-weight: 700;
            font-size: 2rem;
            color: #111;
            }

            /* Filters */
            .filters {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
            }

            .filters label {
            font-weight: 600;
            font-size: 1rem;
            margin-right: 0.5rem;
            }

            select, input[type=date] {
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            border-radius: 20px;
            border: 1px solid #ccc;
            box-shadow: 1px 1px 5px rgba(0,0,0,0.1);
            outline: none;
            transition: border-color 0.3s ease;
            }
            select:focus, input[type=date]:focus {
            border-color: #075985;
            box-shadow: 0 0 5px #075985;
            }

            /* Table */
            table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 1px 1px 5px rgba(0,0,0,0.05);
            }
            th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
            font-weight: 500;
            font-size: 1rem;
            }
            th {
            background: #f9f9f9;
            font-weight: 700;
            }
            td:last-child {
            font-weight: 700;
            }
            tbody tr:last-child td {
            border-bottom: none;
            }

            /* Status */
            .status-available {
            color: #22c55e; /* green */
            }
            .status-booked {
            color: #dc2626; /* red */
            }

            /* Footer */
            footer {
                background-color: #075985;
                color: white;
                text-align: center;
                font-size: 0.9rem;
                padding: 1rem 2rem;
            }

            /* Responsive */
            @media (max-width: 600px) {
            nav {
                justify-content: center;
                gap: 1.5rem;
            }
            nav .nav-links {
                flex-basis: 100%;
                justify-content: center;
                gap: 1rem;
            }
            nav .btn-rooms {
                margin-top: 0.5rem;
            }
            .filters {
                flex-direction: column;
                align-items: flex-start;
            }
            th, td {
                padding: 0.5rem 0.75rem;
            }
            }
        </style>
    </head>

    <body>
        <header>
            <div class="logo">
                <a href="../index.html" class="header-logo"><img src="../assets/logo/logoo.png" alt="Riverview Logo"></a>
                <h1>The Riverview<h1>
            </div>
            <div id="hamburger" class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav id="nav-menu">
                <a href="../index.html">Home</a>
                <a href="../index.html#about">About</a>
                <a href="booking.html">Booking</a>
                <a href="available-rooms.html" id="roomsBtn">See Available Rooms</a>
            </nav>
        </header>

        <main>
            <h2>Real Time Availability</h2>
            <form class="filters" aria-label="Filter availability by facility type and date" onsubmit="return false;">
            <label for="facility-type">Facility Type:</label>
            <select id="facility-type" name="facility-type">
                <option value="all" selected>All</option>
                <option value="basketball">Basketball Court</option>
                <option value="ktv">KTV Room</option>
                <option value="billiards">Billiards Room</option>
            </select>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" aria-describedby="date-help" />
            </form>

            <table aria-label="Facility room availability table">
            <thead>
                <tr>
                <th>Facility/Room</th>
                <th>Time Slot</th>
                <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                <td>Basketball Court</td>
                <td>7AM - 9AM</td>
                <td class="status-available">Available</td>
                </tr>
                <tr>
                <td>KTV Room</td>
                <td>5PM - 7PM</td>
                <td class="status-available">Available</td>
                </tr>
                <tr>
                <td>Billiards Room</td>
                <td>8PM - 10PM</td>
                <td class="status-booked">Booked</td>
                </tr>
            </tbody>
            </table>
        </main>

        <footer>
            &copy; 2026 The Riverview | Web-Based Management System
        </footer>
    </body> 
</html>
