<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking Page - The Riverview</title>
    <link rel="stylesheet" href="../css/header.css">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: #333;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      img {
        max-width: 100%;
        display: block;
      }

      button {
        cursor: pointer;
        border: none;
        font-weight: 600;
      }

      #booking{
      background-color: #c7c8c8;
        color: #0b4e78;
        padding: 10px 20px;
        border: 1px solid;
        transition: background-color 0.3s;
      }

      /* Main content */
      main {
        flex-grow: 1;
        max-width: 600px;
        width: 90%;
        margin: 30px auto;
      }

      main h1 {
        font-size: 1.8rem;
        margin-bottom: 25px;
        font-weight: 700;
      }

      /* Form styles */
      form#booking-form label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .input-wrapper {
        position: relative;
        margin-bottom: 25px;
      }

      input[type="text"],
      input[type="date"],
      input[type="time"],
      select,
      textarea {
        width: 100%;
        padding: 12px 45px 12px 15px;
        border-radius: 15px;
        border: 1px solid #ccc;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s ease;
      }

      input[type="text"]:focus,
      input[type="date"]:focus,
      input[type="time"]:focus,
      select:focus,
      textarea:focus {
        border-color: #005b7f;
      }

      .icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        pointer-events: none;
        color: #333;
      }

      .btn {
        background-color: #005b7f;
        color: white;
        padding: 14px 0;
        width: 100%;
        font-weight: 700;
        font-size: 1.1rem;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-bottom: 10px;
      }

      .btn:hover {
        background-color: #004466;
      }

      .btn-secondary {
        background-color: #6c757d;
      }

      .btn-secondary:hover {
        background-color: #545b62;
      }

      /* Confirmation Modal */
      #confirmation-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      #confirmation-modal {
        background: white;
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 20px;
        padding: 30px;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      }

      .summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 10px;
      }

      .summary-label {
        font-weight: 600;
      }

      .summary-value {
        font-weight: 500;
      }

      /* Footer */
      footer {
        background-color: #005b7f;
        color: #e9e9e9;
        text-align: center;
        padding: 15px 10px;
        font-size: 0.9rem;
      }

      /* Responsive */
      @media (max-width: 600px) {
        #confirmation-modal {
          padding: 20px;
          margin: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
          <a href="../index.html" class="header-logo"><img src="../assets/logo/logoo.png" alt="Riverview Logo"></a>
          <h1>The Riverview<h1>
      </div>
      <div id="hamburger" class="hamburger">
          <span></span>
          <span></span>
          <span></span>
      </div>
      <nav id="nav-menu">
          <a href="../index.html">Home</a>
          <a href="../index.html#about">About</a>
          <a href="booking.html" id="booking">Booking</a>
          <a href="available-rooms.html" class="btn-primary">See Available Rooms</a>
      </nav>
    </header>

    <main>
      <h1>Book Room Or Court</h1>
      <form id="booking-form">
        <div class="input-wrapper">
          <label for="input-room-selection">Select Room/Court:</label>
          <select id="input-room-selection" name="room" required>
            <option value="" disabled selected>Select room or court</option>
            <option value="room1">Room 1</option>
            <option value="room2">Room 2</option>
            <option value="court1">Room 3</option>
            <option value="court2">Court</option>
          </select>
        </div>

        <div class="input-wrapper">
          <label for="input-date">Date:</label>
          <input type="date" id="input-date" name="date" required />
        </div>

        <div class="input-wrapper">
          <label for="input-time">Time:</label>
          <input type="time" id="input-time" name="time" required />
        </div>

        <div class="input-wrapper">
          <label for="input-duration">Duration:</label>
          <input type="text" id="input-duration" name="duration" placeholder="e.g., 2 hours" required />
        </div>

        <div class="input-wrapper">
          <label for="input-name">Full Name:</label>
          <input type="text" id="input-name" name="name" placeholder="Enter your full name" required />
        </div>

        <button type="submit" class="btn" id="btn-confirm-initial">Confirm Booking</button>
      </form>
    </main>

    <!-- Confirmation Overlay -->
    <div id="confirmation-overlay">
      <div id="confirmation-modal">
        <h2 style="margin-bottom: 25px; color: #005b7f;">Review & Confirm Your Booking</h2>
        
        <div id="booking-summary">
          <!-- Dynamic summary items populated by JS -->
        </div>

        <div class="input-wrapper">
          <label for="payment-method">Payment Method:</label>
          <select id="payment-method" required>
            <option value="" disabled selected>Select payment method</option>
            <option value="cash">Cash</option>
            <option value="card">Credit Card</option>
            <option value="gcash">GCash</option>
          </select>
        </div>

        <div class="input-wrapper">
          <label for="comment">Comments / Special Requests:</label>
          <textarea id="comment" rows="4" placeholder="Any special requests?"></textarea>
        </div>

        <button class="btn btn-secondary" id="btn-back">Cancel</button>
        <button class="btn" id="btn-confirm-final">Confirm</button>
      </div>
    </div>

    <footer>
      &copy; 2026 The Riverview | Web-Based Management System
    </footer>

    <script>
      const form = document.getElementById('booking-form');
      const overlay = document.getElementById('confirmation-overlay');
      const summary = document.getElementById('booking-summary');
      const btnInitial = document.getElementById('btn-confirm-initial');
      const btnBack = document.getElementById('btn-back');
      const btnFinal = document.getElementById('btn-confirm-final');

      // Form data capture helper
      function getFormData() {
        const roomEl = document.getElementById('input-room-selection');
        const dateEl = document.getElementById('input-date');
        const timeEl = document.getElementById('input-time');
        const durationEl = document.getElementById('input-duration');
        const nameEl = document.getElementById('input-name');
        return {
          room: roomEl.options[roomEl.selectedIndex].text,
          date: dateEl.value,
          time: timeEl.value,
          duration: durationEl.value,
          name: nameEl.value
        };
      }

      // Populate summary
      function populateSummary(data) {
        summary.innerHTML = `
          <div class="summary-item">
            <span class="summary-label">Room/Court:</span>
            <span class="summary-value">${data.room}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Date:</span>
            <span class="summary-value">${data.date}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Time:</span>
            <span class="summary-value">${data.time}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Duration:</span>
            <span class="summary-value">${data.duration}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Full Name:</span>
            <span class="summary-value">${data.name}</span>
          </div>
        `;
      }

      // First confirm
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const data = getFormData();
        if (!data.room || !data.date || !data.time || !data.duration || !data.name) {
          alert('Please fill all fields.');
          return;
        }
        populateSummary(data);
        document.getElementById('booking-form').style.display = 'none';
        overlay.style.display = 'flex';
      });

      // Back to edit
      btnBack.addEventListener('click', () => {
        overlay.style.display = 'none';
        document.getElementById('booking-form').style.display = 'block';
        document.getElementById('payment-method').value = '';
        document.getElementById('comment').value = '';
      });

      // Final confirm
      btnFinal.addEventListener('click', () => {
        const data = getFormData();
        const payment = document.getElementById('payment-method');
        const comment = document.getElementById('comment');

      if (!payment.value) {
        alert('Please select payment method.');
        return;
      }

      const fullDetails = `
      Booking Confirmed!
      Room/Court: ${data.room}
      Date: ${data.date}
      Time: ${data.time}
      Duration: ${data.duration}
      Full Name: ${data.name}
      Payment: ${payment.options[payment.selectedIndex].text}
      Comment: ${comment.value || 'None'}
        `;

        alert(fullDetails);

        // ✅ Reset everything after confirm
        form.reset();
        overlay.style.display = 'none';
        document.getElementById('booking-form').style.display = 'block';

        // clear extra fields
        payment.value = '';
        comment.value = '';
      });
    </script>
  </body>
</html>
