<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Decision Support Analytics Overview</title>
        <link rel="stylesheet" href="../css/admin-header.css">
        <style>
            /* Reset & base */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
            }
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                margin: 0 0;
                color: #000;
            }

            #analytics button{
                color: white;
                background-color: #000000;
            }

            /* Main content */
            main {
                flex: 1;
                padding: 2rem 3rem;
                color: #000000;
                font-size: 1.2rem;
            }
            /* Main content area */
            main h2{
                margin-top: 0;
                font-weight: 700;
                font-size: 2em;
                color: #0b4e78;
            }
            main.content {
                flex-grow: 1;
                padding: 25px 30px;
                overflow-y: auto;
                background: #fff;
                min-height: 0;
                display: flex;
                flex-direction: column;
                gap: 25px;
            }

            main.content h1 {
                font-weight: 700;
                font-size: 1.5rem;
                margin: 0 0 15px 0;
            }

            /* Grid for top charts */
            .top-charts-grid {
                display: flex;
                gap: 20px 30px;
                flex-wrap: wrap;
            }
            .top-charts-grid > section {
                flex: 1 1 280px;
                min-width: 280px;
            }

            /* Dashboard bottom grid */
            .bottom-grid {
                display: flex;
                gap: 20px 30px;
                flex-wrap: wrap;
            }
            .bottom-grid > section {
                flex: 1 1 280px;
                min-width: 280px;
                border: 1px solid #bbb;
                border-radius: 8px;
                padding: 15px 20px;
                background: #fefefe;
                box-shadow: inset 0 0 8px #e1e1e1;
            }

            /* Chart style container */
            .card {
                border: 1px solid #d0d6db;
                border-radius: 8px;
                background: #fff;
                padding: 20px;
                box-shadow: 0 1px 5px rgb(0 0 0 / 0.07);
            }
            .card h2 {
                font-size: 1.1rem;
                font-weight: 700;
                margin-bottom: 15px;
                color: #055a8c;
            }

            /* Canvas fills card width */
            canvas {
                width: 100% !important;
                height: 220px !important;
            }


            /* Info boxes container */
            .info-container {
                display: flex;
                gap: 1.5rem;
                flex-wrap: wrap;
            }
            .info-box {
                flex: 1 1 300px;
                background-color: white;
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 1.3rem 1.5rem;
                font-size: 0.95rem;
                box-shadow: 0 0 5px rgb(0 0 0 / 0.05);
            }
            .info-box h3 {
                margin-top: 0;
                margin-bottom: 0.7rem;
                font-weight: 600;
                font-size: 1.1rem;
                color: #0a4d82;
            }
            .info-box p {
                margin: 0.3rem 0 1rem 0;
                line-height: 1.4;
            }
            /* Shift summary */
            .shift-summary p {
                margin: 10px 0;
                font-size: 1rem;
                font-weight: 600;
                color: #2c3e50;
            }
            .shift-summary p strong {
                font-weight: 700;
                margin-right: 6px;
            }

            /* Footer */
            footer {
                padding: 14px 25px;
                background-color: #c3d4dc;
                font-size: 0.9rem;
                color: #444;
                text-align: center;
                margin-top: auto;
            }

            /* Responsive adjustments */
            @media (max-width: 900px) {
                .bottom-grid, .top-charts-grid {
                flex-direction: column;
                }
            }
            @media (max-width: 450px) {

                main.content {
                padding: 15px 15px 30px 15px;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <button class="hamburger" aria-label="Open Navigation" aria-expanded="false">
                &#9776;
            </button>
        </header>

        <div class="overlay"></div>

        <div class="container">
            <nav>

                <h1>The Riverview</h1>
                <button class="close-btn" aria-label="Close Navigation">&times;</button>
                <a href="dashboard.html"><button>Admin Dashboard</button></a>
                <a href="manage-bookings.html"><button>Bookings</button></a>
                <a href="analytics.html" id="analytics"><button>Analytics</button></a>
                <a href="reports.html"><button>Reports</button></a>
                <a href="history-log.html"><button>History Log</button></a>
                <a href="settings.html"><button>Settings</button></a>
                <a href="login.html" class="logBtn"><button>Log Out</button></a>

            </nav>

            <main class="content" aria-label="Decision Support Analytics Overview">

                <h2>Decision Support Analytics Overview</h2>

                <div class="top-charts-grid" role="region" aria-label="Booking Trends and Room Usage Distribution">

                    <section class="card" aria-label="Booking Trends">

                        <h2>Booking Trends</h2>
                        <canvas id="bookingTrendsChart" role="img" aria-label="Line chart showing booking trends"></canvas>

                    </section>

                    <section class="card" aria-label="Room Usage Distribution">

                        <h2>Room Usage Distribution</h2>
                        <canvas id="roomUsageChart" role="img" aria-label="Pie chart showing room usage distribution"></canvas>

                    </section>

                    <section aria-label="Revenue Forecast Line Chart" class="bottom-grid">

                        <h2>Revenue Forecast</h2>
                        <canvas id="revenueForecastChart" role="img" aria-label="Line chart showing revenue forecast"></canvas>

                    </section>

                </div>

            </main>

        </div>

        <style>
            .sr-only { 
            position: absolute; 
            width: 1px; 
            height: 1px; 
            padding: 0; 
            margin: -1px; 
            overflow: hidden; 
            clip: rect(0,0,0,0); 
            white-space: nowrap; 
            border: 0; 
            }
        </style>
        <script src="../js/admin-header.js"></script>
        <!-- Chart.js CDN -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            // Booking Trends - Line Chart
            const ctxBooking = document.getElementById('bookingTrendsChart').getContext('2d');
            const bookingTrendsChart = new Chart(ctxBooking, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                label: 'Bookings',
                data: [40, 52, 48, 65, 70, 90],
                borderColor: '#0d4973',
                backgroundColor: 'rgba(13,73,115,0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: '#0d4973'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                },
                },
                scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 10 }
                }
                }
            },
            });

            // Room Usage Distribution - Pie Chart
            const ctxRoomUsage = document.getElementById('roomUsageChart').getContext('2d');
            const roomUsageChart = new Chart(ctxRoomUsage, {
            type: 'pie',
            data: {
                labels: ['Court 1', 'Room 3', 'VIP Room', 'Conference'],
                datasets: [{
                data: [30, 25, 20, 15],
                backgroundColor: ['#2784c2', '#0d4973', '#1d9bd1', '#82b1df'],
                borderColor: '#fff',
                borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: '#222' }
                },
                tooltip: {
                    callbacks: {
                    label: ctx => ctx.label + ': ' + ctx.parsed + '%'
                    }
                }
                }
            },
            });

            // Revenue Forecast - Line Chart from the image data approximation
            const ctxRevenue = document.getElementById('revenueForecastChart').getContext('2d');
            const revenueForecastChart = new Chart(ctxRevenue, {
            type: 'line',
            data: {
                labels: ['January', 'February', 'March', 'April', 'May', 'June'],
                datasets: [{
                label: 'Revenue ($)',
                data: [12000, 15000, 13000, 16000, 15000, 19000],
                borderColor: '#2784c2',
                backgroundColor: 'rgba(39,132,194,0.15)',
                fill: true,
                tension: 0.3,
                pointRadius: 5,
                pointBackgroundColor: '#1769a0'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    callbacks: {
                    label: ctx => '$' + ctx.parsed.y.toLocaleString()
                    }
                }
                },
                scales: {
                y: {
                    min: 10000,
                    max: 20000,
                    ticks: {
                    stepSize: 1000,
                    callback: value => '$' + value.toLocaleString()
                    },
                    grid: {
                    color: '#d7e4f4'
                    }
                },
                x: {
                    grid: {
                    display: false
                    }
                }
                }
            }
            });
        </script>

    </body>
</html>
