<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Reports | Admin Management System</title>
        <link rel="stylesheet" href="../css/admin-header.css">
        <style>
            /* Reset & base */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
            }
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                margin: 0 0;
                color: #000;
            }

            #reports button{
                color: white;
                background-color: #000000;
            }

            /* Main content */
            main {
                flex: 1;
                padding: 2rem 3rem;
                color: #000000;
                font-size: 1.2rem;
            }

            main h2 {
                margin-top: 0;
                font-weight: 700;
                font-size: 2em;
                color: #0b4e78;
            }

            .card {
                background: #fff;
                border-radius: 8px;
                box-shadow: 0 2px 6px rgb(0 0 0 / 0.1);
                padding: 1.5rem;
                margin-bottom: 1.5rem;
                max-width: 100%;
            }
            p.description {
            margin-bottom: 1rem;
            font-size: 1rem;
            color: #333;
            }

            .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            }

            .btn {
            background-color: #0b4d78;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
            flex: 1 1 180px;
            max-width: 220px;
            text-align: center;
            }

            .btn:hover {
            background-color: #084265;
            }

            ul.reports-list {
            list-style: none;
            font-size: 1rem;
            color: #222;
            padding-left: 1.2rem;
            }

            ul.reports-list li {
            position: relative;
            padding-left: 1.6rem;
            margin-bottom: 0.6rem;
            }

            ul.reports-list li::before {
            content: "📄";
            position: absolute;
            left: 0;
            top: 0;
            font-size: 1.2rem;
            line-height: 1;
            }

            footer {
            text-align: center;
            padding: 1rem 0;
            font-size: 0.85rem;
            color: #555;
            background-color: #e2f0f5;
            flex-shrink: 0;
            }

            /* Responsive */
            main {
                padding: 1rem;
            }

            .btn-group {
                justify-content: center;
            }

            @media (max-width: 480px) {
                nav button {
                    flex: 1 1 45%;
                    font-size: 0.85rem;
                    padding: 8px 0;
                }

                .btn {
                    flex: 1 1 100%;
                    max-width: none;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <button class="hamburger" aria-label="Open Navigation" aria-expanded="false">
                &#9776;
            </button>
        </header>

        <div class="overlay"></div>

        <div class="container">
            <nav>
                <h1>The Riverview</h1>
                <button class="close-btn" aria-label="Close Navigation">&times;</button>
                <a href="dashboard.html"><button>Admin Dashboard</button></a>
                <a href="manage-bookings.html"><button>Bookings</button></a>
                <a href="analytics.html"><button>Analytics</button></a>
                <a href="reports.html" id="reports"><button>Reports</button></a>
                <a href="history-log.html"><button>History Log</button></a>
                <a href="settings.html"><button>Settings</button></a>
                <a href="login.html" class="logBtn"><button>Log Out</button></a>
            </nav>

            <main>
                <section class="card" aria-labelledby="generate-reports-title">
                    <h2 id="generate-reports-title">Generate Reports</h2>
                    <p class="description">Download Detailed Reports For Bookings, Payments, And Staff Shifts.</p>
                    <div class="btn-group">
                        <button class="btn" type="button">Generate Booking Report</button>
                    </div>
                </section>

                <section class="card" aria-labelledby="recent-reports-title">
                    <h2 id="recent-reports-title">Recent Reports</h2>
                    <ul class="reports-list">
                        <li>Booking_Report_Feb2026.Pdf</li>
                        <li>Payment_Summary_Jan2026.Pdf</li>
                        <li>Shift_Log_Jan2026.Pdf</li>
                    </ul>
                </section>
            </main>
        </div>
        <script src="../js/admin-header.js"></script>
    </body>
</html>
