<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>History Log</title>
        <link rel="stylesheet" href="../css/admin-header.css">
        <style>
            /* Reset & base */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
            }
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                margin: 0 0;
                color: #000;
            }

            #history button{
                color: white;
                background-color: #000000;
            }

            /* Main content */
            main {
                flex: 1;
                padding: 2rem 3rem;
            }
            main h2 {
                margin-top: 1em;
                margin-bottom: 1em ;
                font-weight: 700;
                font-size: 2em;
                color: #222;
            }
            /* Table styling */
            table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0 10px;
                font-size: 1rem;
                min-width: 600px;
            }

            .tables{
                padding: 1em;
                border: 1px solid black;
                border-radius: 10px;
                margin: 1em;
            }

            .table-header th {
                background-color: #0b4e78;
                color: white;
                height: 45px;
            }

            /* LEFT corner */
            .table-header th:first-child {
                border-top-left-radius: 12px;
                border-bottom-left-radius: 12px;
            }

            /* RIGHT corner */
            .table-header th:last-child {
                border-top-right-radius: 12px;
                border-bottom-right-radius: 12px;
            }   

            thead th {
                padding: 10px 15px;
                text-align: left;
                font-weight: 700;
            }
            tbody tr {
                background-color: #f6f9fc;
                border-radius: 12px;
                box-shadow: 0 0 6px rgb(0 0 0 / 0.1);
                transition: box-shadow 0.3s ease;
            }
            tbody tr:hover {
                box-shadow: 0 0 12px rgb(0 0 0 / 0.15);
            }
            tbody td {
                padding: 12px 15px;
                vertical-align: middle;
            }
            /* Action buttons */
            .action-btn {
                font-size: 0.85rem;
                border: none;
                margin-left: 6px;
                padding: 5px 10px;
                border-radius: 10px;
                cursor: pointer;
                font-weight: 600;
                color: white;
                background-color: #0b4e78;
                transition: background-color 0.25s ease;
            }
            .action-btn.view-btn {
                background-color: #0b4e78;
            }
            .action-btn.cancel-btn {
                background-color: #243e5a;
            }
            .action-btn.approve-btn {
                background-color: #1e94d8;
            }
            .action-btn:hover {
                filter: brightness(85%);
            }
        </style>
    </head>

    <body>
        <header>
            <button class="hamburger" aria-label="Open Navigation" aria-expanded="false">
                &#9776;
            </button>
        </header>

        <div class="overlay"></div>

        <div class="container">
            <nav>
                <h1>The Riverview</h1>
                <button class="close-btn" aria-label="Close Navigation">&times;</button>
                <a href="dashboard.html"><button>Admin Dashboard</button></a>
                <a href="manage-bookings.html"><button>Bookings</button></a>
                <a href="analytics.html"><button>Analytics</button></a>
                <a href="reports.html"><button>Reports</button></a>
                <a href="history-log.html" id="history"><button>History Log</button></a>
                <a href="settings.html"><button>Settings</button></a>
                <a href="login.html" class="logBtn"><button>Log Out</button></a>
            </nav>

            <main>
                <h2>History Log</h2>

                <table role="table" aria-label="Bookings Overview" >

                    <thead class="table-header">
                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Role</th>
                            <th scope="col">Date</th>
                            <th scope="col">Time</th>
                            <th scope="col">Status</th>
                            <th scope="col">Place</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Jian Keith</td>
                            <td>Staff</td>
                            <td>Feb 25, 2026</td>
                            <td>10:00 AM</td>
                            <td><span class="status-pill status-paid">Accepted</span></td>
                            <td>Billiards Booking</td>
                        </tr>
                        <tr>
                            <td>Jian Keith</td>
                            <td>Staff</td>
                            <td>Feb 25, 2026</td>
                            <td>10:00 AM</td>
                            <td><span class="status-pill status-pending">Accepted</span></td>
                            <td>Court</td>
                        </tr>
                    </tbody>
                </table>
            </main>
        </div>
        <script src="../js/admin-header.js"></script>
    </body>

</html>
