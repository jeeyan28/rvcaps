<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>The Riverview - Login</title>
        <style>
        /* Reset some basic styles */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
            Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: #f9f9f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background-color: #ffffff;
            padding: 2.5rem 3rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid #ccc;
            text-align: center;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            background-color: #0b4d6c; /* fallback */
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo svg, .logo img {
            max-width: 70px;
            max-height: 70px;
        }

        .logo-text {
            color: #fff;
            font-size: 0.65rem;
            font-weight: 300;
            position: absolute;
            bottom: 15px;
            letter-spacing: 0.04em;
        }
        
        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.2rem;
            font-weight: 700;
            color: #000;
        }
        
        p.subtitle {
            font-weight: 400;
            font-size: 0.95rem;
            margin: 0 0 1.75rem;
            color: #555;
        }
        
        label {
            display: block;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            color: #222;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            margin-bottom: 1.25rem;
            border: 1.5px solid #0b4d6c;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #d3e1e7;
            transition: background-color 0.3s ease;
        }
        
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            background-color: #c2d4de;
            border-color: #04455f;
        }
        
        button {
            display: block;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 0;
            background-color: #0b4d6c;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #093c53;
        }
        
        .admin-text {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #333;
        }
        
        /* Responsive styling */
        @media (max-width: 480px) {
            .login-container {
            padding: 2rem 1.5rem;
            max-width: 320px;
            }

            h1 {
            font-size: 1.25rem;
            }

            input[type="email"],
            input[type="password"] {
            font-size: 0.95rem;
            }

            button {
            font-size: 0.95rem;
            }
        }
        </style>
    </head>
    
    <body>

        <div class="login-container" role="main" aria-label="Login form">
        
        <div class="logo" aria-hidden="true">
            <!-- Simplified circular logo with text -->
            <img src="../assets/logo/logoo.png"alt="Riverview Logo"/>
            <div class="logo-text">Est. 2023</div>
        </div>
        
        <h1>Welcome To The Riverview</h1>
        <p class="subtitle">Sign In To Continue</p>
        
        <form id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required />
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
            
            <button type="submit" id="submitBtn">Log In</button>
        </form>
        
        <p class="admin-text">Admin? Use Your Admin Credentials To Log In</p>
        </div>
          <script>
                document.getElementById('loginForm').addEventListener('submit', function(event) {
                    event.preventDefault(); // <- prevent page reload
                    // You can read the input values here if you want
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    // For demo, just redirect
                    window.location.href = 'dashboard.html';
                });
            </script>
    </body>

</html>
