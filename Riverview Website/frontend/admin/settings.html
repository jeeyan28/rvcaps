<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Settings</title>
        <link rel="stylesheet" href="../css/admin-header.css">
        <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0 0;
            color: #000;
        }

        #settings button{
            color: white;
            background-color: #000000;
        }

        /* Main content */
        main {
            flex: 1;
            padding: 2rem 3rem;
            color: #000000;
            font-size: 1.2rem;
        }

        main h2 {
            margin-top: 0;
            font-weight: 700;
            font-size: 2em;
            color: #0b4e78;
        }
        /* Main content styles */
        main.content {
            background-color: #fff;
            width: 100%;
        }

        /* Section styles */
        section {
            margin-bottom: 2rem;
            max-width: 100%;
        }
        section h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        #addAccountBtn{
            box-shadow: none;
        }

        /* Modal overlay */
        .modal {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(6px);

            opacity: 0;
            visibility: hidden;
            pointer-events: none; /* 🔥 THIS FIXES IT */
            transition: 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto; /* allow clicks only when open */
        }

        /* Popup box */
        .modal-box {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;


            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);

            transform: scale(0.8);
            transition: 0.3s ease;
        }

        .modal-close{
            background: none;
            border: none;
            padding: 10px 15px;
            font-size: 25px;
            font-weight: bolder;
            cursor: pointer;
            transition: border 0.9s ease;
        }
        .modal-close:hover{
            border: 0.5px solid;
            background-color: rgb(239, 239, 239);
        }
        /* Animate when open */
        .modal.show .modal-box {
            transform: scale(1);
        }

        /* Close button */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            border: none;
            background: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Form styles */
        form {
            background-color: #f0f4f8;
            border-radius: 10px;
            padding: 1.5rem 1.5rem 2rem;
            box-shadow: 0 2px 6px rgb(0 0 0 / 0.1);
        }
        form label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        form input[type="text"],
        form input[type="email"],
        form input[type="password"],
        form select {
            width: 100%;
            padding: 10px 15px;
            font-size: 1rem;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            transition: border-color 0.3s;
        }
        form input[type="text"]:focus,
        form input[type="email"]:focus,
        form input[type="password"]:focus,
        form select:focus {
            border-color: #0a4a78;
            outline: none;
        }

        /* Filters container */
        td select {
            padding: 10px 15px;
            font-size: 1rem;
            border: 1.5px solid #ccc;
            border-radius: 12px;
            outline-offset: 2px;
            outline-color: #0b4e78;
            min-width: 150px;
        }
        /* Table styling */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            font-size: 1rem;
            min-width: 600px;
        }

        .tables{
            padding: 1em;
            border: 1px solid black;
            border-radius: 10px;
            margin: 1em;
        }

        table thead{
            background-color: #0b4e78;
            color: white;
            height: 45px;
        }

        /* LEFT corner */
        table thead th:first-child {
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }

        /* RIGHT corner */
        table thead th:last-child {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        thead th {
            padding: 10px 15px;
            text-align: left;
            font-weight: 700;
        }
        tbody tr {
            background-color: #f6f9fc;
            border-radius: 12px;
            box-shadow: 0 0 6px rgb(0 0 0 / 0.1);
            transition: box-shadow 0.3s ease;
        }
        tbody tr:hover {
            box-shadow: 0 0 12px rgb(0 0 0 / 0.15);
        }
        tbody td {
            padding: 12px 15px;
            vertical-align: middle;
        }
        /* Action buttons */
        .action-btn {
            font-size: 0.85rem;
            border: none;
            margin-left: 6px;
            padding: 5px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background-color: #0b4e78;
            transition: background-color 0.25s ease;
        }
        .action-btn.edit-btn {
            background-color: #0b4e78;
        }
        .action-btn.delete-btn {
            background-color: #dc0000;
        }

        .action-btn:hover {
            filter: brightness(85%);
        }

        button.primary-btn {
            background-color: #0a4a78;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 26px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 8px rgb(10 74 120 / 0.6);
            transition: background-color 0.3s ease;
        }
        button.primary-btn:hover {
            background-color: #14568a;
        }

        /* System Maintenance Section Buttons */
        .maintenance-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            .container {
            flex-direction: column;
            }
            nav.sidebar {
            width: 100%;
            flex-direction: row;
            overflow-x: auto;
            border-bottom: 4px solid #aac8da;
            }
            nav.sidebar button, nav.sidebar .active {
            flex-grow: 1;
            text-align: center;
            border-top: none;
            border-left: 1px solid #aac8da;
            border-right: 1px solid #aac8da;
            border-bottom: none;
            font-size: 0.9rem;
            padding: 12px 10px;
            }
            nav.sidebar button:first-child, nav.sidebar .active:first-child {
            border-left: none;
            }
            main.content {
            padding: 1rem 1rem 2rem;
            }
            section {
            margin-bottom: 1.5rem;
            max-width: 100%;
            }
        }
        </style>
    </head>

    <body>
        <header>
            <button class="hamburger" aria-label="Open Navigation" aria-expanded="false">
                &#9776;
            </button>
        </header>

        <div class="overlay"></div>

        <div class="container">
            <nav>
                <h1>The Riverview</h1>
                <button class="close-btn" aria-label="Close Navigation">&times;</button>
                <a href="dashboard.html"><button>Admin Dashboard</button></a>
                <a href="manage-bookings.html"><button>Bookings</button></a>
                <a href="analytics.html"><button>Analytics</button></a>
                <a href="reports.html"><button>Reports</button></a>
                <a href="history-log.html"><button>History Log</button></a>
                <a href="settings.html" id="settings"><button>Settings</button></a>
                <a href="login.html" class="logBtn"><button>Log Out</button></a>
            </nav>

            <main class="content" role="main" tabindex="-1">

                <div >
                    <h2>Account Settings</h2>
                    <button id="addAccountBtn" class="primary-btn" type="button">
                        Add Account +   
                    </button>
                    
                    <section id="accountSection" class="modal">
                        <div class="modal-box">
                            <button class="modal-close">&times;</button>
                            <h2>Add Account</h2>
                            <form>
                                <label for="adminName">Name</label>
                                <input type="text" id="adminName" name="adminName" required/>

                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required/>

                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" required/>

                                <button type="submit" class="primary-btn">Save</button>
                                <button onclick="goBack()" type="submit" class="primary-btn">Cancel</button>
                            </form>
                        </div>
                    </section>
                </div>

                <section>
                    <table role="table" aria-label="Bookings Overview" >
                        <thead>
                            <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Role</th>
                            <th scope="col">Date</th>
                            <th scope="col">Time</th>
                            <th scope="col">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                            <td>Jian Keith</td>
                            <td>
                                <select class="facilityFilter" aria-label="Filter by facility">

                                    <option value="all">Owner</option>
                                    <option value="all">Supervisor</option>
                                    <option value="all">Staff</option>

                                </select>
                            </td>
                            <td>Feb 25, 2026</td>
                            <td><span class="status-pill status-paid">12:00 am</span></td>
                            <td>
                                <button class="action-btn edit-btn" type="button" aria-label="View booking #001">Edit</button>
                                <button class="action-btn delete-btn" type="button" aria-label="Cancel booking #001">Delete</button>
                            </td>
                            </tr>
                            <tr>
                            <td>Jian Keith</td>
                            <td>
                                <select class="facilityFilter" aria-label="Filter by facility">

                                    <option value="all">Owner</option>
                                    <option value="all">Supervisor</option>
                                    <option value="all">Staff</option>

                                </select>
                            </td>
                            <td>Feb 25, 2026</td>
                            <td><span class="status-pill status-pending">12:98 pm</span></td>
                            <td>
                                <button class="action-btn edit-btn" type="button" aria-label="View booking #002">Edit</button>
                                <button class="action-btn delete-btn" type="button" aria-label="Approve booking #002">Delete</button>
                            </td>
                            </tr>
                        </tbody>
                    </table>
                </section>

                <section aria-labelledby="system-maintenance">
                <h2 id="system-maintenance">System Maintenance</h2>
                    <form>
                        <p style="margin: 0 0 1rem;">
                        Perform Maintenance Tasks Such As Clearing Old Bookings Or Resetting Analytics Data.
                        </p>
                        <div class="maintenance-buttons">
                        <button type="button" class="primary-btn">Clear Old Bookings</button>
                        <button type="button" class="primary-btn">Reset Analytics</button>
                        </div>
                    </form>
                </section>
            </main>
        </div>
        <script src="../js/admin-header.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
            const btn = document.getElementById("addAccountBtn");
            const modal = document.getElementById("accountSection");
            const closeBtn = document.querySelector(".modal-close");

            // DEBUG (optional)
            console.log(btn, modal, closeBtn);

            // open popup
            btn.addEventListener("click", () => {
                modal.classList.add("show");
            });

            // close with X
            closeBtn.addEventListener("click", () => {
                modal.classList.remove("show");
            });

            // close when clicking outside
            modal.addEventListener("click", (e) => {
                if (e.target === modal) {
                    modal.classList.remove("show");
                }
            });
        });

        function goBack() {
            window.history.back();
        }
        </script>
    </body>
</html>
